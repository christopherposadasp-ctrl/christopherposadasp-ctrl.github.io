<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">StatsRPackage overview graphic</title>
  <desc id="desc">A polished overview graphic for StatsRPackage highlighting inference, testing, power analysis, and sample-size planning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09121b"/>
      <stop offset="55%" stop-color="#102132"/>
      <stop offset="100%" stop-color="#17314b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1b2b"/>
      <stop offset="100%" stop-color="#12283d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9a441"/>
      <stop offset="100%" stop-color="#7cc6b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1400" cy="120" r="190" fill="#d9a441" opacity="0.12"/>
  <circle cx="220" cy="760" r="240" fill="#7cc6b8" opacity="0.10"/>
  <circle cx="1190" cy="700" r="260" fill="#ffffff" opacity="0.03"/>

  <g filter="url(#shadow)">
    <rect x="84" y="78" width="1432" height="744" rx="34" fill="url(#panel)" stroke="rgba(255,255,255,0.12)"/>
  </g>

  <rect x="130" y="126" width="172" height="36" rx="18" fill="rgba(217,164,65,0.12)" stroke="rgba(217,164,65,0.35)"/>
  <text x="160" y="149" fill="#f3c467" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">R PACKAGE</text>

  <text x="128" y="260" fill="#f7f2ea" font-size="104" font-family="Georgia, 'Times New Roman', serif" font-weight="700">StatsRPackage</text>
  <text x="132" y="322" fill="#cad4df" font-size="34" font-family="Arial, Helvetica, sans-serif">
    Reusable statistical tooling built for coursework, correctness, and repeatable analysis.
  </text>

  <text x="132" y="414" fill="#f3c467" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.8">WHAT IT COVERS</text>

  <g>
    <rect x="130" y="446" width="292" height="134" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="162" y="496" fill="#7cc6b8" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Confidence Intervals</text>
    <text x="162" y="536" fill="#f7f2ea" font-size="42" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Inference</text>
    <text x="162" y="568" fill="#c6d0db" font-size="20" font-family="Arial, Helvetica, sans-serif">One-sample, two-sample, pooled, z, Welch</text>
  </g>

  <g>
    <rect x="452" y="446" width="292" height="134" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="484" y="496" fill="#7cc6b8" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Hypothesis Tests</text>
    <text x="484" y="536" fill="#f7f2ea" font-size="42" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Testing</text>
    <text x="484" y="568" fill="#c6d0db" font-size="20" font-family="Arial, Helvetica, sans-serif">Consistent workflows and exam-ready use</text>
  </g>

  <g>
    <rect x="130" y="604" width="292" height="134" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="162" y="654" fill="#7cc6b8" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Power Analysis</text>
    <text x="162" y="694" fill="#f7f2ea" font-size="42" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Planning</text>
    <text x="162" y="726" fill="#c6d0db" font-size="20" font-family="Arial, Helvetica, sans-serif">Design choices backed by quantitative checks</text>
  </g>

  <g>
    <rect x="452" y="604" width="292" height="134" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <text x="484" y="654" fill="#7cc6b8" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Sample Size</text>
    <text x="484" y="694" fill="#f7f2ea" font-size="42" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Sizing</text>
    <text x="484" y="726" fill="#c6d0db" font-size="20" font-family="Arial, Helvetica, sans-serif">Reusable helpers for better study design</text>
  </g>

  <g>
    <rect x="820" y="186" width="612" height="390" rx="28" fill="rgba(7,17,28,0.76)" stroke="rgba(255,255,255,0.12)"/>
    <text x="862" y="236" fill="#f3c467" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.6">PACKAGE APPROACH</text>

    <rect x="862" y="276" width="160" height="54" rx="14" fill="rgba(124,198,184,0.10)" stroke="rgba(124,198,184,0.30)"/>
    <text x="896" y="311" fill="#f7f2ea" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Input</text>

    <rect x="1050" y="276" width="160" height="54" rx="14" fill="rgba(217,164,65,0.10)" stroke="rgba(217,164,65,0.30)"/>
    <text x="1078" y="311" fill="#f7f2ea" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Method</text>

    <rect x="1238" y="276" width="160" height="54" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
    <text x="1268" y="311" fill="#f7f2ea" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Output</text>

    <path d="M1022 303 L1048 303" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <path d="M1210 303 L1236 303" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

    <text x="862" y="390" fill="#f7f2ea" font-size="40" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
      Built for more than one assignment.
    </text>
    <text x="862" y="438" fill="#c9d2dd" font-size="24" font-family="Arial, Helvetica, sans-serif">
      Consistent APIs, documentation, regression checks, and reusable analytical workflows.
    </text>

    <rect x="862" y="484" width="536" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>
    <rect x="862" y="484" width="412" height="12" rx="6" fill="url(#accent)"/>

    <text x="862" y="542" fill="#f7f2ea" font-size="22" font-family="Arial, Helvetica, sans-serif">
      Correctness
    </text>
    <text x="1040" y="542" fill="#f7f2ea" font-size="22" font-family="Arial, Helvetica, sans-serif">
      Documentation
    </text>
    <text x="1270" y="542" fill="#f7f2ea" font-size="22" font-family="Arial, Helvetica, sans-serif">
      Reuse
    </text>
  </g>

  <rect x="130" y="784" width="1268" height="10" rx="5" fill="url(#accent)" opacity="0.95"/>
  <text x="130" y="838" fill="#d5dde6" font-size="22" font-family="Arial, Helvetica, sans-serif">
    Public portfolio graphic for StatsRPackage: inference, testing, power analysis, and sample-size planning in one reusable workflow.
  </text>
</svg>
