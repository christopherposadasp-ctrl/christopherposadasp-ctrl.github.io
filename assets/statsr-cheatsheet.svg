<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">StatsRPackage code sample</title>
  <desc id="desc">Stylized code panel showing confidence interval helper usage from StatsRPackage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09131f"/>
      <stop offset="100%" stop-color="#13293d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9a441"/>
      <stop offset="100%" stop-color="#7cc6b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1330" cy="140" r="180" fill="#d9a441" opacity="0.12"/>
  <circle cx="270" cy="760" r="220" fill="#7cc6b8" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="92" y="86" width="1416" height="728" rx="28" fill="#0c1826" stroke="#22384d" stroke-width="2"/>
    <rect x="92" y="86" width="1416" height="56" rx="28" fill="#101f30"/>
    <circle cx="136" cy="114" r="9" fill="#ec6a5f"/>
    <circle cx="166" cy="114" r="9" fill="#f5bf4f"/>
    <circle cx="196" cy="114" r="9" fill="#61c554"/>
    <rect x="240" y="104" width="320" height="20" rx="10" fill="#18324a"/>
    <text x="266" y="119" fill="#9db0c3" font-size="18" font-family="Instrument Sans, Arial, sans-serif">StatsRPackage / cheatsheet</text>

    <rect x="126" y="168" width="420" height="548" rx="18" fill="#0f2133" stroke="#1d3851"/>
    <rect x="574" y="168" width="900" height="548" rx="18" fill="#091520" stroke="#1d3851"/>
    <rect x="126" y="744" width="1348" height="38" rx="12" fill="#0f2133" stroke="#1d3851"/>

    <text x="160" y="214" fill="#f3c467" font-size="22" font-family="Instrument Sans, Arial, sans-serif" font-weight="700">Core Function</text>
    <text x="160" y="264" fill="#7cc6b8" font-size="30" font-family="Consolas, Monaco, monospace">ci_mu(</text>
    <text x="190" y="308" fill="#f7f2ea" font-size="28" font-family="Consolas, Monaco, monospace">xbar, n,</text>
    <text x="190" y="352" fill="#f7f2ea" font-size="28" font-family="Consolas, Monaco, monospace">s = NULL, sigma = NULL,</text>
    <text x="190" y="396" fill="#f7f2ea" font-size="28" font-family="Consolas, Monaco, monospace">conf.level = 0.95,</text>
    <text x="190" y="440" fill="#f7f2ea" font-size="28" font-family="Consolas, Monaco, monospace">side = c("two.sided", "lower", "upper"),</text>
    <text x="190" y="484" fill="#f7f2ea" font-size="28" font-family="Consolas, Monaco, monospace">method = c("welch", "pooled", "z"),</text>
    <text x="190" y="528" fill="#f7f2ea" font-size="28" font-family="Consolas, Monaco, monospace">digits = 4, quiet = FALSE</text>
    <text x="160" y="572" fill="#7cc6b8" font-size="30" font-family="Consolas, Monaco, monospace">)</text>

    <text x="612" y="214" fill="#f3c467" font-size="22" font-family="Instrument Sans, Arial, sans-serif" font-weight="700">Example Usage</text>

    <text x="612" y="274" fill="#7cc6b8" font-size="28" font-family="Consolas, Monaco, monospace"># One-sample z CI</text>
    <text x="612" y="318" fill="#f7f2ea" font-size="30" font-family="Consolas, Monaco, monospace">ci_mu(xbar = 2.25, n = 36, sigma = 1.5)</text>

    <text x="612" y="392" fill="#7cc6b8" font-size="28" font-family="Consolas, Monaco, monospace"># One-sample t CI</text>
    <text x="612" y="436" fill="#f7f2ea" font-size="30" font-family="Consolas, Monaco, monospace">ci_mu(xbar = 12.4, n = 15, s = 3.2)</text>

    <text x="612" y="510" fill="#7cc6b8" font-size="28" font-family="Consolas, Monaco, monospace"># Two-sample Welch CI</text>
    <text x="612" y="554" fill="#f7f2ea" font-size="30" font-family="Consolas, Monaco, monospace">ci_mu(xbar = c(65, 63), n = c(40, 38),</text>
    <text x="642" y="594" fill="#f7f2ea" font-size="30" font-family="Consolas, Monaco, monospace">s = c(3.0, 2.5), method = "welch")</text>

    <text x="612" y="668" fill="#9db0c3" font-size="24" font-family="Instrument Sans, Arial, sans-serif">
      Reusable inference helpers built for correctness, documentation, and repeated use.
    </text>

    <rect x="150" y="754" width="410" height="18" rx="9" fill="url(#glow)" opacity="0.85"/>
    <text x="584" y="770" fill="#d7dde5" font-size="19" font-family="Instrument Sans, Arial, sans-serif">
      Public portfolio visual derived from StatsRPackage confidence-interval workflows
    </text>
  </g>
</svg>
